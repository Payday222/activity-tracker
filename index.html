<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Tracker</title>

    <style>
        /* body {
            background-color: #1e1e1e;
        } */
  #topTenList {
    list-style: none;
    padding: 0;
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #1e1e1e;
    border-radius: 8px;
    padding: 12px;
    color: #eee;
  }

  #topTenList li {
    padding: 10px 14px;
    margin-bottom: 6px;
    background: #2a2a2a;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s ease;
    font-size: 14px;
  }

  #topTenList li:hover {
    background: #333;
  }

  .app-name {
    font-weight: 500;
  }

  .app-time {
    font-weight: 600;
    color: #4fc3f7;
  }
</style>
</head>
<body>
<div id="app">
    <h1>Tracker</h1>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<div id="linechart-div">
    <canvas id="lineChart" width="500" height="300"></canvas>
</div>

<div style="width: 200; height: 200;">
    <canvas id="pieChart" width="200px" height="200px"></canvas>
</div>

<div id="top-ten">
    <ul id="topTenList"></ul>
</div>
<script src="renderer.js"></script>

</body>


</html>
